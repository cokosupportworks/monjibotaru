<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>もんじぼたる Ver3.2</title>
    <!-- アプリアイコンの設定 -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="apple-touch-icon.png">


    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; user-select: none; -webkit-user-select: none; overscroll-behavior: none; touch-action: manipulation; transition: background-color 0.3s; }
        .font-klee { font-family: 'Klee One', cursive; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* アラート時の背景色 */
        body.alert-bg { background: #FEF08A !important; }
        
        /* トグルスイッチのスタイル */
        .toggle-checkbox:checked { right: 0; border-color: #3B82F6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3B82F6; }
        .toggle-hotaru:checked + .toggle-label { background-color: #FBBF24; border-color: #FBBF24;}
        
        /* 音設定用トグルスイッチ */
        .sound-toggle:checked ~ .toggle-bg { background-color: #3B82F6; }
        .sound-toggle:checked ~ .toggle-dot { transform: translateX(100%); }
        
        #loadingOverlay { position: fixed; inset: 0; background-color: #f0f9ff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease-out; }
        .loading-spinner { width: 50px; height: 50px; border: 5px solid #e0f2fe; border-top: 5px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 道路標識風スタイル */
        .speed-sign {
            width: 50px; height: 50px; border-radius: 50%; border: 6px solid #EF4444; background-color: white;
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: #1E3A8A; font-size: 1.25rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 20; transition: all 0.3s;
        }
        .alert-flash { animation: flashRed 0.5s ease-out; }
        @keyframes flashRed { 0% { background-color: #FEE2E2; border-color: #DC2626; transform: scale(1.1); } 100% { background-color: white; border-color: #EF4444; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 text-gray-800 flex flex-col fixed inset-0">

    <!-- フォント事前読み込み用の隠し要素 -->
    <div style="font-family: 'Klee One'; position: absolute; opacity: 0; pointer-events: none; z-index: -1;">あ</div>
    <div style="font-family: 'Zen Maru Gothic'; position: absolute; opacity: 0; pointer-events: none; z-index: -1;">あ</div>

    <!-- クラクション点滅用オーバーレイ -->
    <div id="hornFlashOverlay" class="fixed inset-0 bg-yellow-400 pointer-events-none z-[60] opacity-0 transition-opacity"></div>

    <!-- アラート用オーバーレイ -->
    <div id="noticeOverlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-sm pointer-events-auto select-none" data-can-close="false">
        <img src="mnotice.png" alt="注意" class="max-w-[95vw] max-h-[95vh] object-contain drop-shadow-2xl rounded-2xl pointer-events-none" onerror="this.outerHTML='<div class=\'bg-white p-8 rounded-3xl border-8 border-red-500 flex flex-col items-center drop-shadow-2xl pointer-events-none transform transition-transform hover:scale-105\'><div class=\'text-[100px] leading-none animate-bounce\'>⚠️</div><div class=\'text-3xl font-bold text-red-600 mt-4 font-klee\'>はやいよ！きをつけて！</div></div>'" />
    </div>

    <div id="loadingOverlay">
        <div class="loading-spinner mb-4"></div>
        <div class="text-xl font-bold text-gray-600 tracking-widest animate-pulse font-klee">じゅんびちゅう...</div>
    </div>

    <!-- ★起動時ポップアップ (おとの確認) -->
    <div id="soundInitPopup" class="fixed inset-0 z-[110] hidden items-center justify-center bg-black/50 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl flex flex-col items-center text-center transform scale-95 transition-transform duration-300 border-4 border-indigo-200" id="soundInitPopupInner">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mb-4">
                <span class="text-3xl">🎵</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">おとの せってい</h2>
            <p class="text-gray-600 font-bold mb-6">にがてな おとを<br>けすことができます。</p>
            
            <div class="w-full flex flex-col gap-3">
                <button id="btnStartApp" class="w-full bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-bold text-xl py-3 rounded-2xl shadow-md hover:shadow-lg transform active:scale-95 transition-all">はじめる</button>
                <button id="btnOpenSoundSettingsFromInit" class="w-full bg-gray-100 text-gray-700 font-bold py-3 rounded-2xl border-2 border-gray-200 hover:bg-gray-200 transform active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>🔊</span> おとの せってい
                </button>
            </div>
            
            <label class="mt-5 flex items-center gap-2 text-sm font-bold text-gray-500 cursor-pointer">
                <input type="checkbox" id="dontShowPopupCb" class="w-5 h-5 rounded text-indigo-500 focus:ring-indigo-500 border-gray-300">
                つぎから ひょうじしない
            </label>
        </div>
    </div>

    <!-- ★個別効果音設定ウィンドウ -->
    <div id="soundSettingsModal" class="fixed inset-0 z-[120] hidden items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-5 w-full max-w-md max-h-[90vh] shadow-2xl flex flex-col border-4 border-indigo-200 transform scale-95 transition-transform duration-300" id="soundSettingsModalInner">
            <div class="flex justify-between items-center mb-4 border-b border-gray-200 pb-3 shrink-0">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="text-2xl">🔊</span> おとの せってい
                </h2>
                <button id="closeSoundSettingsBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-1.5 rounded-full text-sm font-bold transition-colors">けってい</button>
            </div>
            
            <div class="flex gap-2 mb-4 shrink-0">
                <button id="btnAllSoundOn" class="flex-1 bg-indigo-50 text-indigo-600 border border-indigo-200 py-2 rounded-xl font-bold text-sm hover:bg-indigo-100 transition-colors">ぜんぶ ON</button>
                <button id="btnAllSoundOff" class="flex-1 bg-gray-50 text-gray-600 border border-gray-200 py-2 rounded-xl font-bold text-sm hover:bg-gray-100 transition-colors">ぜんぶ OFF</button>
            </div>

            <div class="overflow-y-auto no-scrollbar flex-1 -mx-2 px-2">
                <ul id="soundOptionsList" class="flex flex-col gap-3 pb-4">
                    <!-- JSで動的にリストを生成します -->
                </ul>
            </div>
        </div>
    </div>

    <!-- ★おすすめワード設定ウィンドウ -->
    <div id="presetSettingsModal" class="fixed inset-0 z-[130] hidden items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-5 w-full max-w-md max-h-[95vh] shadow-2xl flex flex-col border-4 border-emerald-200 transform scale-95 transition-transform duration-300" id="presetSettingsModalInner">
            <div class="flex justify-between items-center mb-3 border-b border-gray-200 pb-3 shrink-0">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="text-2xl">📝</span> おすすめワード
                </h2>
                <button id="closePresetSettingsBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-1.5 rounded-full text-sm font-bold transition-colors">とじる</button>
            </div>
            
            <div class="flex-1 overflow-y-auto no-scrollbar flex flex-col gap-4">
                <!-- 登録済みリスト -->
                <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100">
                    <p class="text-xs font-bold text-emerald-700 mb-2">いま ある ワード</p>
                    <div id="presetEditorList" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- 新規追加エリア -->
                <div class="bg-indigo-50 p-3 rounded-2xl border border-indigo-100 flex flex-col">
                    <p class="text-xs font-bold text-indigo-700 mb-2">あたらしく ついかする</p>
                    <div class="flex gap-2 items-center justify-center mb-3">
                        <div id="presetEditorInput1" class="w-14 h-14 bg-white border-2 border-indigo-300 rounded-xl flex items-center justify-center text-2xl font-bold text-indigo-700 shadow-inner"></div>
                        <div id="presetEditorInput2" class="w-14 h-14 bg-white border-2 border-gray-300 rounded-xl flex items-center justify-center text-2xl font-bold text-gray-400 shadow-inner"></div>
                        <button id="btnClearPresetInput" class="ml-2 w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-300 transition-colors font-bold text-lg">✖</button>
                    </div>
                    
                    <!-- 文字盤タブ -->
                    <div class="flex gap-1.5 bg-gray-100 p-1.5 rounded-xl mb-2">
                        <button id="tabPresetHiragana" class="flex-1 py-1.5 rounded-lg font-bold text-xs transition-all bg-white text-indigo-600 shadow-sm">ひらがな</button>
                        <button id="tabPresetKatakana" class="flex-1 py-1.5 rounded-lg font-bold text-xs transition-all text-gray-500 hover:bg-white/60">カタカナ</button>
                        <button id="tabPresetNumber" class="flex-1 py-1.5 rounded-lg font-bold text-xs transition-all text-gray-500 hover:bg-white/60">すうじ</button>
                    </div>
                    <div id="presetDakuonToggleArea" class="flex justify-end mb-2">
                        <button id="presetToggleDakuonBtn" class="px-3 py-1 rounded-lg font-bold text-xs flex items-center justify-center gap-1 transition-all border bg-gray-50 text-gray-600 border-gray-200"><span id="presetDakuonBtnText">ふつうのもじ</span></button>
                    </div>
                    
                    <!-- キーボード -->
                    <div id="presetEditorKeyboard" class="grid grid-cols-5 gap-1.5 h-36 overflow-y-auto pr-1 mb-3"></div>
                    
                    <button id="btnAddPresetWord" class="w-full bg-emerald-500 text-white font-bold py-2.5 rounded-xl opacity-50 cursor-not-allowed transition-all" disabled>＋ ついかする</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ヘッダー -->
    <header class="bg-white/90 backdrop-blur-md p-3 shadow-sm flex flex-wrap items-center justify-center gap-4 z-30 flex-shrink-0 border-b border-indigo-100">
        <div class="flex items-center gap-2">
            <div class="bg-blue-500 p-1.5 rounded-full shadow-inner animate-pulse">
                <svg class="text-white w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-wider">もんじ<span class="text-blue-500">ぼたる</span> <span class="text-xs text-gray-500 font-normal ml-1">Ver3.2</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="openSelectorBtn" class="px-4 py-1.5 rounded-full font-bold text-sm transition-all transform active:scale-95 shadow-md flex items-center justify-center gap-2 bg-indigo-500 hover:bg-indigo-600 text-white w-auto">もじをえらぶ</button>
            <button id="openSettingsBtn" class="p-2 rounded-full hover:bg-gray-200 transition-colors bg-gray-100 text-gray-600 shadow-sm border border-gray-200">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 p-4 flex flex-col items-center justify-start gap-4 w-full mx-auto relative overflow-y-auto no-scrollbar pb-20">
        
        <!-- 設定パネル -->
        <div id="settingsPanel" class="hidden absolute top-0 z-40 w-full max-w-md bg-white/95 backdrop-blur-md p-5 rounded-3xl shadow-2xl border-4 border-indigo-200 animate-[fadeIn_0.3s_ease-out] flex flex-col max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-4 border-b border-gray-200 pb-3 sticky top-0 bg-white/90 z-10">
                <h2 class="font-bold text-xl text-gray-800 flex items-center gap-2">
                    <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    せってい
                </h2>
                <button id="closeSettingsBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-1.5 rounded-full text-sm font-bold transition-colors">とじる</button>
            </div>

            <!-- ほたるモード設定 -->
            <div class="mb-5 bg-yellow-50 p-4 rounded-2xl border border-yellow-100">
               <div class="flex items-center justify-between mb-3">
                 <span class="font-bold text-yellow-800 flex items-center gap-2">
                   <div id="hotaruIndicator" class="w-3 h-3 rounded-full bg-yellow-400 animate-ping"></div>
                   ほたる モード
                 </span>
                 <button id="hotaruSwitchBtn" class="w-14 h-8 rounded-full p-1 transition-colors duration-300 flex items-center bg-yellow-400 justify-end"><div class="w-6 h-6 bg-white rounded-full shadow-md"></div></button>
               </div>
               
               <div id="hotaruControls" class="flex flex-col gap-3 mt-2 border-t border-yellow-200 pt-3">
                   <div class="flex flex-col w-full">
                        <div class="flex justify-between mb-1"><span class="font-bold text-gray-700 text-xs">ひかる じかん</span><span id="visibleDurationDisplay" class="font-bold text-yellow-600 text-xs">2びょう</span></div>
                        <input type="range" id="visibleDurationSlider" min="0" max="10" step="1" value="2" class="w-full h-3 bg-white rounded-lg appearance-none cursor-pointer accent-yellow-500 border border-yellow-200">
                   </div>
                   <div class="flex items-center justify-between bg-white p-2 rounded-lg border border-yellow-200 shadow-sm">
                       <span class="font-bold text-gray-700 text-xs">はじめだけ ひかる</span>
                       <button id="oneTimeFlashBtn" class="w-12 h-6 rounded-full p-1 transition-colors duration-300 flex items-center bg-gray-300 justify-start">
                           <div class="w-4 h-4 bg-white rounded-full shadow-md"></div>
                       </button>
                   </div>
                   <div class="flex flex-col w-full relative">
                        <div class="flex justify-between mb-1"><span class="font-bold text-gray-700 text-xs">きえる じかん</span><span id="hiddenDurationDisplay" class="font-bold text-gray-500 text-xs">2びょう</span></div>
                        <input type="range" id="hiddenDurationSlider" min="0" max="10" step="1" value="2" class="w-full h-3 bg-white rounded-lg appearance-none cursor-pointer accent-gray-400 border border-gray-200 transition-opacity duration-300">
                   </div>
               </div>
            </div>

            <!-- 文字サイズ -->
            <div class="mb-5 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <div class="flex justify-between mb-2 items-center">
                    <span class="font-bold text-gray-700">もじの おおきさ</span>
                    <span id="charSizeDisplay" class="font-bold text-indigo-600 bg-indigo-100 px-3 py-1 rounded-full">10</span>
                </div>
                <input type="range" id="charSizeSlider" min="1" max="10" value="10" class="w-full h-4 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            </div>

            <!-- スピード制限機能 -->
            <div class="mb-5 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <div class="flex items-center justify-between mb-3">
                    <span class="font-bold text-blue-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="3"/><text x="12" y="16" text-anchor="middle" font-weight="bold" font-size="10" fill="#1E3A8A" stroke="none">速度</text></svg>
                        スピードせいげん
                    </span>
                    <button id="speedLimitSwitchBtn" class="w-14 h-8 rounded-full p-1 transition-colors duration-300 flex items-center bg-gray-300 justify-start"><div class="w-6 h-6 bg-white rounded-full shadow-md"></div></button>
                </div>
                
                <div id="speedLimitControls" class="hidden flex-col gap-3 mt-2 border-t border-blue-200 pt-3">
                    <div class="flex justify-center gap-2 mb-2">
                        <button id="tabDemoSpeed" class="flex-1 py-1.5 rounded-lg font-bold text-xs transition-all bg-white text-blue-600 shadow-sm border border-blue-200">じどう デモ</button>
                        <button id="tabManualSpeed" class="flex-1 py-1.5 rounded-lg font-bold text-xs transition-all text-gray-500 hover:bg-white/50 border border-transparent">じぶんで はかる</button>
                    </div>
                    <div class="flex justify-center mb-2">
                        <div class="relative bg-white rounded-xl shadow-inner border-2 border-gray-200 overflow-hidden" style="width: 120px; height: 120px;">
                            <canvas id="speedDemoCanvas" width="120" height="120" class="absolute top-0 left-0"></canvas>
                            <div id="manualOverlay" class="hidden absolute inset-0 bg-blue-500/10 flex items-center justify-center pointer-events-none">
                                <span class="text-xs font-bold text-blue-600 bg-white/80 px-2 py-1 rounded-full">なぞってね！</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col w-full">
                        <div class="flex justify-between mb-1 items-center">
                            <span class="font-bold text-gray-700 text-xs">せいげん そくど</span>
                            <div class="speed-sign !w-8 !h-8 !border-[3px] !text-sm"><span id="speedLimitDisplay">50</span></div>
                        </div>
                        <input type="range" id="speedLimitSlider" min="10" max="80" step="5" value="50" class="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500">
                        <div class="flex justify-between text-[10px] text-gray-400 mt-1 px-1"><span>ゆっくり</span><span>はやい</span></div>
                    </div>
                </div>
            </div>

            <!-- ★おとのせってい / おすすめワード（メインメニュー内） -->
            <div class="flex flex-col gap-2 mb-5">
                <button id="btnOpenSoundSettingsFromMenu" class="w-full bg-white text-gray-700 border border-gray-200 py-3 rounded-2xl font-bold shadow-sm hover:bg-gray-50 transition-colors flex items-center justify-between px-4">
                    <span class="flex items-center gap-2"><span class="text-xl">🔊</span> おとの せってい</span>
                    <span class="text-gray-400 text-xs">ひらく ▶</span>
                </button>
                <button id="btnOpenPresetSettingsFromMenu" class="w-full bg-white text-emerald-700 border border-emerald-200 py-3 rounded-2xl font-bold shadow-sm hover:bg-emerald-50 transition-colors flex items-center justify-between px-4">
                    <span class="flex items-center gap-2"><span class="text-xl">📝</span> おすすめワード</span>
                    <span class="text-emerald-400 text-xs">ひらく ▶</span>
                </button>
            </div>
            
            <!-- データ管理 -->
            <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200 mb-[50px]">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold text-gray-600 text-sm">システム じょうたい</span>
                    <div id="systemStatusDisplay" class="text-[10px] font-mono text-white bg-green-500 px-2 py-1 rounded-full shadow-inner">OK</div>
                </div>
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-700 text-sm">いまの きろく</span>
                    <span id="dataCountDisplay" class="font-bold text-indigo-600 text-lg bg-white px-3 py-1 rounded-lg shadow-sm">0もじ</span>
                </div>
                <div class="border-t border-gray-200 pt-2">
                    <button onclick="resetAllData()" class="w-full bg-white border border-red-300 text-red-500 text-xs font-bold py-2 rounded-lg hover:bg-red-50 transition-colors">きろくを ぜんぶ けす</button>
                </div>
            </div>
        </div>

        <!-- プレイエリア Layout -->
        <div class="flex flex-col gap-6 items-center justify-center w-full mt-2">
            <!-- キャンバスラッパー: 2もじモード時は横幅が広がる -->

        function checkBounds(x,y) { const w = els.drawingCanvas.width; const h = els.drawingCanvas.height; if(x<12||x>w-12||y<12||y>h-12){ if(!state.hasError){state.hasError=true;updateUI();} if(Date.now()-alertThrottleRef>300){playSound('alert');alertThrottleRef=Date.now();} return true; } return false; }
        
        function handleStart(e) {

            state.strokes.push([p]); checkBounds(p.x,p.y); state.isDrawing=true; state.isSpeedOver=false;
            state.pointHistory = [{x: p.x, y: p.y, t: Date.now()}]; state.accumulatedDist = 0;

        function handleMove(e) { 
            if(!state.isDrawing || state.feedback || state.isWarningActive) return; 
            e.preventDefault(); const p=getCoordinates(e);

                if (state.pointHistory.length > 2) {

                    if (timeSec > 0) {

        // ★形状・画数判定用ヘルパー関数
        function performShapeCheck(strokes, targetChar, allPts) {
            const targetVec = VECTOR_DATA[targetChar];
            const targetCount = STROKE_COUNTS[targetChar];
            const userCount = strokes.length;
            if (!targetVec || allPts.length < 10) return { ok: true }; 

            const shapeCheck = checkDakutenHandakuten(targetChar, strokes);
            if (!shapeCheck.ok) return { ok: false, msg: shapeCheck.msg };

            const enemies = CONFUSING_PAIRS[targetChar];
            if (enemies) {
                for (const enemyChar of enemies) {
                    const enemyVec = VECTOR_DATA[enemyChar];
                    if (enemyVec) {
                        const enemyScore = calculateVectorScore(enemyVec, allPts);
                        const vScore = calculateVectorScore(targetVec, allPts);
                        const isDakuPair = ('ぱぴぷぺぽ'.includes(targetChar) && 'ばびぶべぼ'.includes(enemyChar)) || ('ばびぶべぼ'.includes(targetChar) && 'ぱぴぷぺぽ'.includes(enemyChar));
                        if (enemyScore >= vScore) {
                            if (isDakuPair) {
                                const enemyCount = STROKE_COUNTS[enemyChar];
                                if (userCount === targetCount && userCount !== enemyCount) continue;
                                if (userCount === enemyCount) return { ok: false, msg: "てんてん と まる を まちがえてない？" };
                            } else {
                                return { ok: false, msg: `「${enemyChar}」に なってない？` };
                            }
                        }
                    }
                }
            }
            if (targetCount) {
                const isDakutenOrHandakuten = 'がぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽ'.includes(targetChar) || 'ガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポ'.includes(targetChar);
                if (isDakutenOrHandakuten) {
                    if (userCount !== targetCount) return { ok: false, msg: "かくすう が ちがうよ" };
                } else {
                    if (targetCount === 1 && userCount > 1) return { ok: false, msg: "さあ、れんしゅう れんしゅう！" };
                    else if (Math.abs(userCount - targetCount) > 1) return { ok: false, msg: "さあ、れんしゅう れんしゅう！" };
                }
            }
            return { ok: true };
        }

        function evaluate() {
            const w = els.drawingCanvas.width; const h = els.drawingCanvas.height;
            const allPoints = state.strokes.flat(); const uD=ctx.draw.getImageData(0,0,w,h).data; const gD=ctx.guide.getImageData(0,0,w,h).data; const fD=ctx.feedback.createImageData(w,h);
            let pass=0; if(guideCheckpointsRef.length===0){ state.feedback={score:0,message:"なぞってみよう！",stars:0}; updateUI(); return; }
            guideCheckpointsRef.forEach(p=>{ if(uD[(p.y*w+p.x)*4+3]>50) pass++; }); const acc = pass/guideCheckpointsRef.length;
            let skeletonCovered = 0; for (const sp of state.targetSkeleton) { const idx = (Math.floor(sp.y) * w + Math.floor(sp.x)) * 4; if (uD[idx+3] > 20) skeletonCovered++; }
            const skeletonCoverRate = state.targetSkeleton.length > 0 ? skeletonCovered / state.targetSkeleton.length : 0; const coverPercent = Math.round(skeletonCoverRate * 100);
            let errPx=0, totPx=0; for(let i=0;i<uD.length;i+=4){ if(uD[i+3]>50){ totPx++; if(gD[i+3]<20) errPx++; else{ fD.data[i]=255;fD.data[i+1]=100;fD.data[i+2]=100;fD.data[i+3]=200; } } }
            ctx.feedback.putImageData(fD,0,0);
            let msg="", isWrong=false; 
            
            // 全体の長さチェック
            let lengthScore = 0; let coverageScore = 0; let userTotalLength = 0; let targetTotalLength = state.targetSkeleton.length * 2.2; 
            for (const stroke of state.strokes) { for (let i = 1; i < stroke.length; i++) userTotalLength += Math.hypot(stroke[i].x - stroke[i-1].x, stroke[i].y - stroke[i-1].y); }
            if (targetTotalLength > 0) {
                const ratio = userTotalLength / targetTotalLength;
                if (targetTotalLength < 300) { if (ratio >= 0.9 && ratio <= 1.1) lengthScore = 100; else if ((ratio >= 0.7 && ratio < 0.9) || (ratio > 1.1 && ratio <= 1.3)) lengthScore = 50; else if ((ratio >= 0.5 && ratio < 0.7) || (ratio > 1.3 && ratio <= 1.5)) lengthScore = 25; else lengthScore = 0; } 
                else { if (ratio >= 0.8 && ratio <= 1.2) lengthScore = 100; else if ((ratio >= 0.6 && ratio < 0.8) || (ratio > 1.2 && ratio <= 1.4)) lengthScore = 50; else if ((ratio >= 0.4 && ratio < 0.6) || (ratio > 1.4 && ratio <= 1.6)) lengthScore = 25; else lengthScore = 0; }
                if (ratio >= 2.0) { msg = "ぬりつぶさないで！"; isWrong = true; lengthScore = 0; } else if (ratio <= 0.20) { msg = "もっと かいて！"; isWrong = true; lengthScore = 0; } else if (lengthScore === 0) { msg = "さあ、れんしゅう れんしゅう！"; }
            }
            if (coverPercent >= 85) coverageScore = 100; else if (coverPercent >= 70) coverageScore = 50; else if (coverPercent >= 50) coverageScore = 25; else coverageScore = 0;
            if (coverPercent <= 10) { coverageScore = 0; isWrong = true; if(!msg) msg = "もっと ていねいに なぞろう！"; }
            if (coverageScore === 0 && !isWrong) { if(!msg) msg = "もっと ていねいに なぞろう！"; }
            
            // ★形状と画数のチェック（1文字/2文字対応）
            if (allPoints.length > 20) {
                if (state.writeMode === 'single') {
                    const shapeRes = performShapeCheck(state.strokes, state.selectedChar, allPoints);
                    if (!shapeRes.ok) { isWrong = true; msg = shapeRes.msg; lengthScore = 0; coverageScore = 0; }
                } else {
                    // 2文字モード時の左右分割チェック
                    const leftStrokes = state.strokes.filter(s => s[0].x < w / 2);
                    const rightStrokes = state.strokes.filter(s => s[0].x >= w / 2);
                    const leftPoints = leftStrokes.flat();
                    const rightPoints = rightStrokes.flat();

                    const resL = performShapeCheck(leftStrokes, state.selectedWord[0], leftPoints);
                    const resR = performShapeCheck(rightStrokes, state.selectedWord[1], rightPoints);

                    if (leftStrokes.length === 0) { isWrong = true; msg = "ひだり も かいてね！"; lengthScore = 0; coverageScore = 0; }
                    else if (rightStrokes.length === 0) { isWrong = true; msg = "みぎ も かいてね！"; lengthScore = 0; coverageScore = 0; }
                    else if (!resL.ok && !resR.ok) { isWrong = true; msg = "どっちも もうすこし！"; lengthScore = 0; coverageScore = 0; } 
                    else if (!resL.ok) { isWrong = true; msg = "ひだり: " + resL.msg; lengthScore = 0; coverageScore = 0; } 
                    else if (!resR.ok) { isWrong = true; msg = "みぎ: " + resR.msg; lengthScore = 0; coverageScore = 0; }
                }
            }

            let totalScore = lengthScore + coverageScore; let stars = 0;
            if (totalScore >= 200) stars = 3; else if (totalScore >= 100) stars = 2; else if (totalScore >= 25) stars = 1; else stars = 0;

            if (state.hasSpeedOverThisTurn) { if (stars >= 2) stars = 1; else stars = 0; msg = "ゆっくり、ていねいにかこう！"; }

            if(totPx<100) { msg="なぞってみよう！"; playSound('btn'); } else if (isWrong || stars === 0) { stars = 0; if(!msg) msg = "さあ、れんしゅう れんしゅう！"; playSound('fail'); } else { if(!msg) { if (stars === 3) { msg="すごい！ はなまる だね！"; playSound('success'); } else if (stars === 2) { msg="じょうず！ そのちょうし！"; playSound('success'); } else { msg="さあ、れんしゅう れんしゅう！"; playSound('btn'); } } else { if (stars >= 2) playSound('success'); else playSound('btn'); } }
            
            state.feedback={score:totalScore, message:msg, stars};
            if(totPx>0 && stars>0) saveScore(stars); 
            updateUI();
        }

        function drawDemoBase() {

            if(vec && vec.length > 0) { ctx.demo.beginPath(); ctx.demo.lineCap = 'round'; ctx.demo.lineJoin = 'round'; ctx.demo.lineWidth = 14; ctx.demo.strokeStyle = '#E2E8F0'; ctx.demo.moveTo(vec[0].x * 120, vec[0].y * 120); for(let i = 1; i < vec.length; i++) ctx.demo.lineTo(vec[i].x * 120, vec[i].y * 120); ctx.demo.stroke(); }

        function animateSpeedDemo() {
            if(!state.showSettings || !state.isSpeedLimitOn || state.speedDemoMode !== 'auto') return; drawDemoBase();
            if(demoPoints.length > 0) {
                const speedFactor = (state.speedLimit / 40) * 1.5; demoProgress += speedFactor; if(demoProgress >= demoPoints.length + 20) demoProgress = 0; 
                const endIdx = Math.min(Math.floor(demoProgress), demoPoints.length - 1);
                if(endIdx > 0) {
                    ctx.demo.beginPath(); ctx.demo.lineCap='round'; ctx.demo.lineJoin='round'; ctx.demo.lineWidth=6; ctx.demo.strokeStyle='#F472B6'; ctx.demo.moveTo(demoPoints[0].x * 120, demoPoints[0].y * 120); for(let i=1; i<=endIdx; i++) ctx.demo.lineTo(demoPoints[i].x * 120, demoPoints[i].y * 120); ctx.demo.stroke();
                    ctx.demo.beginPath(); ctx.demo.arc(demoPoints[endIdx].x * 120, demoPoints[endIdx].y * 120, 4, 0, Math.PI*2); ctx.demo.fillStyle='#BE185D'; ctx.demo.fill();
                }

        window.addEventListener('mousemove', manualMove); window.addEventListener('touchmove', manualMove, {passive:false});
        window.addEventListener('mouseup', manualEnd); window.addEventListener('touchend', manualEnd);

        function manualStart(e) { if(state.speedDemoMode !== 'manual') return; e.preventDefault(); const r = els.speedDemoCanvas.getBoundingClientRect(); const t = e.touches?e.touches[0]:e; const px = t.clientX - r.left; const py = t.clientY - r.top; manualPts = [{x: px, y: py, t: Date.now()}]; manualStartTime = Date.now(); manualMaxSpeed = 0; drawDemoBase(); ctx.demo.beginPath(); ctx.demo.moveTo(px,py); ctx.demo.lineCap='round'; ctx.demo.lineWidth=6; ctx.demo.strokeStyle='#3B82F6'; els.manualOverlay.classList.add('hidden'); }
        function manualMove(e) { if(state.speedDemoMode !== 'manual' || manualPts.length === 0) return; if(e.target !== els.speedDemoCanvas) return; e.preventDefault(); const r = els.speedDemoCanvas.getBoundingClientRect(); const t = e.touches?e.touches[0]:e; const px = t.clientX - r.left; const py = t.clientY - r.top; const now = Date.now(); manualPts.push({x: px, y: py, t: now}); ctx.demo.lineTo(px, py); ctx.demo.stroke(); let recentPts = manualPts.filter(pt => now - pt.t < 150); if (recentPts.length > 2) { const oldest = recentPts[0]; const dist = Math.hypot(px - oldest.x, py - oldest.y); const timeSec = (now - oldest.t) / 1000; if (timeSec > 0) { const speed = dist / 120 / timeSec; if (speed > manualMaxSpeed) manualMaxSpeed = speed; } } }
        function manualEnd() { if(state.speedDemoMode !== 'manual' || manualPts.length < 5) { manualPts = []; return; } let newLimit = 50; if (manualMaxSpeed > 0) newLimit = Math.round((manualMaxSpeed / 1.5) * 40); newLimit = Math.max(10, Math.min(80, Math.ceil(newLimit/5)*5)); state.speedLimit = newLimit; playSound('success'); els.manualOverlay.innerHTML = `<span class="text-xs font-bold text-white bg-green-500 px-2 py-1 rounded-full shadow-md">そくど ${newLimit}！</span>`; els.manualOverlay.classList.remove('hidden'); updateUI(); saveAppSettings(); manualPts = []; setTimeout(() => { if(state.speedDemoMode === 'manual') els.manualOverlay.innerHTML = `<span class="text-xs font-bold text-blue-600 bg-white/80 px-2 py-1 rounded-full">なぞってね！</span>`; }, 1500); }

                renderGrid(); // メインメニューも更新しておく
            };

            function closeWarning(e) { e.preventDefault(); e.stopPropagation(); if (els.noticeOverlay.dataset.canClose === "true") { els.noticeOverlay.classList.add('hidden'); els.noticeOverlay.classList.remove('flex'); state.isWarningActive = false; if (!warnVoice.paused) { warnVoice.pause(); warnVoice.currentTime = 0; } } }
            els.noticeOverlay.addEventListener('mousedown', closeWarning); els.noticeOverlay.addEventListener('touchstart', closeWarning, {passive: false});
        }
        
        async function init() { 
            log("アプリ初期化中..."); await loadScores(); await loadAppSettings();
            initializeData(); setupEventListeners(); updateUI(); updateSelectorUI(); resetCanvas(); renderGrid(); startHotaruCycle(); 
        }

        async function onResume() { log("画面復帰: データ再読み込み"); await loadScores(); await loadAppSettings(); updateSelectorUI(); renderGrid(); updateUI(); }
        window.addEventListener('pageshow', (event) => { if (event.persisted) onResume(); });
        document.addEventListener('visibilitychange', () => { 
            if (document.visibilityState === 'visible') { audioUnlocked = false; document.addEventListener('touchstart', unlockAudio, { once: true, passive: true }); document.addEventListener('mousedown', unlockAudio, { once: true, passive: true }); onResume(); } 
            else { if (!stopVoice.paused) stopVoice.pause(); if (!warnVoice.paused) warnVoice.pause(); if (sharedAudioCtx && sharedAudioCtx.state === 'running') { sharedAudioCtx.suspend(); } }
        });
        window.addEventListener('focus', onResume);

        window.onload = async () => {
            const loadingOverlay = document.getElementById('loadingOverlay');
            try { await document.fonts.ready; await document.fonts.load('1rem "Klee One"'); await document.fonts.load('1rem "Zen Maru Gothic"'); } catch (e) {}
            
            await init();
            if (document.fonts) { document.fonts.ready.then(() => { drawGuide(); }); }

            setTimeout(() => { 
                loadingOverlay.style.opacity = '0'; 
                setTimeout(() => { 
                    loadingOverlay.style.display = 'none'; 
                    if (state.showSoundPopupOnStart) openModal(els.soundInitPopup, els.soundInitPopupInner);
                }, 500); 
            }, 500);
        };
    </script>
</body>
</html>
